name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '17' }

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Android project
        run: |
          mkdir -p app/src/main/java/com/lilyvalley/xixi
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap-hdpi

          # Copy icon
          cp public/icon-192.png app/src/main/res/mipmap-hdpi/ic_launcher.png 2>/dev/null || true

          # settings.gradle
          echo "rootProject.name='LilyValley'" > settings.gradle
          echo "include ':app'" >> settings.gradle

          # root build.gradle
          echo "plugins { id 'com.android.application' version '8.7.3' apply false }" > build.gradle

          # app/build.gradle
          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.lilyvalley.xixi'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.lilyvalley.xixi'
                  minSdk 21; targetSdk 34
                  versionCode 1; versionName '1.0'
              }
              buildTypes { release { minifyEnabled false } }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          }
          EOF

          # gradle.properties
          echo "android.useAndroidX=true" > gradle.properties
          echo "org.gradle.jvmargs=-Xmx2048m" >> gradle.properties

          # AndroidManifest.xml
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="铃兰"
                  android:usesCleartextTraffic="true"
                  android:hardwareAccelerated="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:configChanges="orientation|screenSize|keyboardHidden"
                      android:theme="@android:style/Theme.NoTitleBar">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # MainActivity.java
          cat > app/src/main/java/com/lilyvalley/xixi/MainActivity.java << 'JAVAEND'
          package com.lilyvalley.xixi;
          import android.app.Activity;
          import android.os.Bundle;
          import android.view.KeyEvent;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          public class MainActivity extends Activity {
              private static final String URL = "https://xixi-fable.up.railway.app";
              private WebView wv;
              @Override
              protected void onCreate(Bundle s) {
                  super.onCreate(s);
                  wv = new WebView(this);
                  WebSettings ws = wv.getSettings();
                  ws.setJavaScriptEnabled(true);
                  ws.setDomStorageEnabled(true);
                  ws.setDatabaseEnabled(true);
                  ws.setUseWideViewPort(true);
                  ws.setLoadWithOverviewMode(true);
                  ws.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
                  wv.setWebViewClient(new WebViewClient());
                  wv.loadUrl(URL);
                  setContentView(wv);
              }
              @Override
              public boolean onKeyDown(int k, KeyEvent e) {
                  if (k == KeyEvent.KEYCODE_BACK && wv.canGoBack()) { wv.goBack(); return true; }
                  return super.onKeyDown(k, e);
              }
          }
          JAVAEND

      - name: Build APK
        run: |
          echo "sdk.dir=${ANDROID_HOME}" > local.properties
          gradle wrapper --gradle-version 8.9
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lily-valley-apk
          path: app/build/outputs/apk/release/app-release-unsigned.apk
